name: expense_tracker_app
description: Expense tracker and spliter for groups
publish_to: "none"
version: 1.3.1+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.4.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  onesignal_flutter: ^5.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  adaptive_icon_background: "#0A1319"
  adaptive_icon_foreground: assets/icon.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/icon.png
    background_color: "#0A1319"
    theme_color: "#26D3B4"
  windows:
    generate: true
    image_path: assets/icon.png
  macos:
    generate: true
    image_path: assets/icon.png

flutter_native_splash:
  color: "#0A1319"
  image: assets/icon.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#0A1319"
    image: assets/icon.png
