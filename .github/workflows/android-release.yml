name: Android APK Release

on:
  push:
    branches:
      - "main"
      - "master"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.1.0)"
        required: true
        type: string
      version_name:
        description: "Android versionName override (optional)"
        required: false
        type: string
      version_code:
        description: "Android versionCode override (optional integer)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag }}"
            VERSION_NAME_INPUT="${{ inputs.version_name }}"
            VERSION_CODE_INPUT="${{ inputs.version_code }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION_NAME_INPUT=""
            VERSION_CODE_INPUT=""
          else
            APP_VERSION_LINE=$(grep -E '^version:' app/pubspec.yaml | head -n 1 || true)
            if [[ -z "${APP_VERSION_LINE}" ]]; then
              echo "Could not find version in app/pubspec.yaml"
              exit 1
            fi
            APP_VERSION=$(echo "${APP_VERSION_LINE}" | sed -E 's/^version:[[:space:]]*([^+[:space:]]+).*/\1/')
            TAG_NAME="v${APP_VERSION}"
            VERSION_NAME_INPUT=""
            VERSION_CODE_INPUT=""
          fi

          VERSION_NAME="${VERSION_NAME_INPUT}"
          if [[ -z "${VERSION_NAME}" ]]; then
            VERSION_NAME="${TAG_NAME#v}"
          fi

          VERSION_CODE="${VERSION_CODE_INPUT}"
          if [[ -z "${VERSION_CODE}" ]]; then
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi

          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          TAG_NAME="${{ steps.release_meta.outputs.tag_name }}"

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "${TAG_NAME}$"; then
            echo "Tag ${TAG_NAME} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build universal APK
        working-directory: app
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm,android-arm64 \
            --dart-define=API_BASE_URL=https://expense-tracker-7aie.onrender.com/api \
            --dart-define=INVITE_SHARE_BASE_URL=https://expense-tracker-7aie.onrender.com/invite \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE"

      - name: Build split-per-ABI APKs
        working-directory: app
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform android-arm,android-arm64 \
            --dart-define=API_BASE_URL=https://expense-tracker-7aie.onrender.com/api \
            --dart-define=INVITE_SHARE_BASE_URL=https://expense-tracker-7aie.onrender.com/invite \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE"

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts

          cp app/build/app/outputs/flutter-apk/app-release.apk \
            "release-artifacts/SplitUp-${TAG_NAME}-universal.apk"

          cp app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "release-artifacts/SplitUp-${TAG_NAME}-armeabi-v7a.apk"

          cp app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "release-artifacts/SplitUp-${TAG_NAME}-arm64-v8a.apk"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: splitup-android-apks-${{ steps.release_meta.outputs.tag_name }}
          path: release-artifacts/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: Split Up ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true
          files: release-artifacts/*.apk
